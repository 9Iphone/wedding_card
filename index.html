<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>
            <div class="pocket"></div>
            
            <div class="letter">
                <div class="logo">P & M</div>
                <h2>You are invited!</h2>
                <p>คลิกเพื่อดูรายละเอียดงาน</p>
            </div>
        </div>

        <div class="action-buttons">
            <button id="toggle-btn">เปิดซอง</button>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const toggleBtn = document.getElementById('toggle-btn');

        function toggleEnvelope() {
            envelope.classList.toggle('open');
            
            if (envelope.classList.contains('open')) {
                toggleBtn.textContent = 'ปิดซอง';
            } else {
                toggleBtn.textContent = 'เปิดซอง';
            }
        }

        toggleBtn.addEventListener('click', toggleEnvelope);
        envelope.addEventListener('click', toggleEnvelope);
    </script>
</body>
</html>
