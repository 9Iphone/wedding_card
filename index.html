<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จดหมายของคุณ 💌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="flap"></div>     <div class="pocket"></div>   <div class="letter">
                <h2>เซอร์ไพรส์! 🎉</h2>
                <p>นี่คือแอนิเมชันเปิดจดหมายที่สร้างด้วย CSS ล้วนๆ โหลดเร็วและน่ารักมาก!</p>
            </div>
        </div>

        <div class="buttons">
            <button id="open-btn">เปิดจดหมาย</button>
            <button id="close-btn">พับเก็บ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
